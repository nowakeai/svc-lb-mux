apiVersion: v1
kind: Service
metadata:
  name: mux
  namespace: default
  annotations:
    lb4-multiplexer.altlayer.io/multiplexer: "true"
spec:
  type: LoadBalancer
  ports:
    - name: placeholder
      protocol: TCP
      port: 8888
      targetPort: 8888
status:
  loadBalancer:
    ingress:
      - hostname: multiplexer.local
