{{- if .Values.defaultLoadBalancer.create }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.defaultLoadBalancer.name }}
  labels:
    {{- include "svc-lb-mux.labels" . | nindent 4 }}
    {{- with .Values.defaultLoadBalancer.labels }}
    {{- . | toYaml | nindent 4 }}
    {{- end }}
  annotations:
    helm.sh/resource-policy: keep
    {{ printf "%s/multiplexer" .Values.api.prefix | quote }}: "true"
    {{- with .Values.defaultLoadBalancer.portRange }}
    {{ printf "%s/port-range" $.Values.api.prefix | quote }}: {{ . | quote }}
    {{- end }}
    {{- with .Values.defaultLoadBalancer.allocationConfigMapName }}
    {{ printf "%s/allocation-configmap" $.Values.api.prefix | quote }}: {{ . | quote }}
    {{- end }}
    {{- range $key, $value := .Values.defaultLoadBalancer.annotations }}
    {{- if $value }}
    {{ $key | quote }}: {{ $value | quote }}
    {{- end }}
    {{- end }}
spec:
  type: LoadBalancer
  {{- with .Values.defaultLoadBalancer.loadBalancerIP }}
  loadBalancerIP: {{ . | quote }}
  {{- end }}
  allocateLoadBalancerNodePorts: {{ .Values.defaultLoadBalancer.allocateLoadBalancerNodePorts }}
  {{- with .Values.defaultLoadBalancer.externalTrafficPolicy }}
  externalTrafficPolicy: {{ . }}
  {{- end }}
  {{- with .Values.defaultLoadBalancer.internalTrafficPolicy }}
  internalTrafficPolicy: {{ . }}
  {{- end }}
  {{- with .Values.defaultLoadBalancer.loadBalancerClass }}
  loadBalancerClass: {{ . }}
  {{- end }}
  ports:
    - name: placeholder
      protocol: TCP
      port: 101
{{- end }}
