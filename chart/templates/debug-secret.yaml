{{- if and .Values.debugWeb.enabled .Values.debugWeb.auth.enabled (not .Values.debugWeb.auth.existingSecret) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "lb4-multiplexer.fullname" . }}-debug-token
  labels:
    {{- include "lb4-multiplexer.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if .Values.debugWeb.auth.token }}
  token: {{ .Values.debugWeb.auth.token | b64enc | quote }}
  {{- else }}
  # Generate a random token if not provided
  token: {{ randAlphaNum 32 | b64enc | quote }}
  {{- end }}
{{- end }}
