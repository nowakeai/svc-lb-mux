{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "lb4-multiplexer.fullname" . }}-rolebinding
  labels:
    {{- include "lb4-multiplexer.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "lb4-multiplexer.fullname" . }}-role
subjects:
- kind: ServiceAccount
  name: {{ include "lb4-multiplexer.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
{{- end }}
