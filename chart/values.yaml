api:
  # Annotation/finalizer/loadBalancerClass prefix used by the controller.
  prefix: svc-mux.nowake.ai

replicaCount: 1

image:
  repository: ghcr.io/nowakeai/svc-lb-mux
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: "svc-mux"
fullnameOverride: ""

rbac:
  create: true
  # rbac rules for role creation
  rules: []
  # - apiGroups: [""]
  #   resources: ["configmaps"]
  #   verbs: ["get", "watch", "list"]
  # - apiGroups: [""]
  #   resources: ["pods"]
  #   verbs: ["get", "watch", "list"]

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  port: 8080  # Debug web UI port
  healthPort: 8081  # Kopf health check port

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

# Additional volumes on the output Deployment definition.
volumes: []
# - name: foo
#   secret:
#     secretName: mysecret
#     optional: false

# Additional volumeMounts on the output Deployment definition.
volumeMounts: []
# - name: foo
#   mountPath: "/etc/foo"
#   readOnly: true

nodeSelector: {}

tolerations: []

affinity: {}

livenessProbe:
  httpGet:
    path: /healthz
    port: health
readinessProbe:
  httpGet:
    path: /healthz
    port: health
startupProbe:
  httpGet:
    path: /healthz
    port: health
  failureThreshold: 30
  periodSeconds: 2

command: [kopf]
args:
  - run
  - --verbose
  - --standalone
  - --all-namespaces
  - --liveness=http://0.0.0.0:8081/healthz
  - /app/main.py

env: []
  # Additional environment variables
  # - name: SVC_LB_MUX_DEBUG
  #   value: "true"
  # - name: DRYRUN_MODE
  #   value: "false"
  # - name: DEFAULT_MUX_NAMESPACE
  #   value: "svc-mux"

# Debug web UI configuration
debugWeb:
  # Enable debug web UI
  enabled: true

  # Active debug actions such as TCP probes are disabled by default.
  actions:
    enabled: false

  # Authentication configuration for web UI
  # If auth.enabled is true, all requests must authenticate using HTTP Basic Auth
  auth:
    enabled: true
    # Token for authentication (used as the password in Basic Auth)
    # Username can be anything (e.g., "admin")
    # Password must be this token
    #
    # If not set, a random token will be generated
    # existingSecret can be used to provide token from an existing secret
    token: ""
    existingSecret: ""
    existingSecretKey: "token"

  # Ingress configuration to expose debug web UI externally
  ingress:
    enabled: false
    className: ""
    annotations: {}
      # kubernetes.io/ingress.class: nginx
      # cert-manager.io/cluster-issuer: letsencrypt-prod
      # nginx.ingress.kubernetes.io/ssl-redirect: "true"
    hosts:
      - host: svc-mux-debug.example.com
        paths:
          - path: /
            pathType: Prefix
    tls: []
    #  - secretName: svc-mux-debug-tls
    #    hosts:
    #      - svc-mux-debug.example.com

defaultLoadBalancer:
  create: true
  # Default mux Service name. Override this with a semantic name when useful.
  name: mux
  labels: {}
  annotations:
    # Create a backend service-based external passthrough Network Load Balancer on GKE.
    # Set this to an empty string in provider-specific values to omit it.
    cloud.google.com/l4-rbs: "enabled"
    # Optional: bind by GCP address resource name on GKE 1.29+.
    # networking.gke.io/load-balancer-ip-addresses: my-mux-ip
    # Optional: choose Standard or Premium network tier. Premium is the GCP default.
    # cloud.google.com/network-tier: Premium
  # Optional: bind by IPv4 address. Reserve the regional static address first.
  loadBalancerIP: ""
  loadBalancerClass: ""
  allocateLoadBalancerNodePorts: true
  # Optional mux external port range for channel annotations that request auto allocation.
  # Example channel annotation: svc-mux.nowake.ai/external-ports: "http:auto"
  portRange: "20000-21000"
  # Optional ConfigMap name for stable auto-allocated port mappings.
  # Defaults to <mux-name>-port-allocations when portRange is enabled.
  allocationConfigMapName: ""
