name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.10.11"

      - uses: azure/setup-helm@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: tools/rlpx-verify/go.mod
          cache-dependency-path: tools/rlpx-verify/go.sum

      - name: Check dependency lockfile
        run: uv lock --check

      - name: Compile Python sources
        run: make python-compile

      - name: Run unit tests
        run: make test

      - name: Lint chart and Python code
        run: make lint

      - name: Render Helm chart
        run: helm template svc-mux chart

      - name: Test tools
        working-directory: tools/rlpx-verify
        run: go test ./...

  image:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=semver,pattern={{version}}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  release:
    runs-on: ubuntu-latest
    needs: [validate, image]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: azure/setup-helm@v4

      - name: Prepare release artifacts
        run: mkdir -p dist

      - name: Build changelog
        id: build_changelog
        uses: mikepenz/release-changelog-builder-action@v6
        with:
          mode: COMMIT
          outputFile: dist/RELEASE_NOTES.md
          configurationJson: |
            {
              "template": "#{{CHANGELOG}}",
              "empty_template": "No user-facing changes were detected by the changelog builder.",
              "commit_template": "- #{{TITLE}} (#{{MERGE_SHA}})",
              "categories": [
                {
                  "title": "## Features",
                  "labels": ["feat", "feature"]
                },
                {
                  "title": "## Fixes",
                  "labels": ["fix", "bug"]
                },
                {
                  "title": "## Documentation",
                  "labels": ["docs", "documentation"]
                },
                {
                  "title": "## CI and Maintenance",
                  "labels": ["build", "chore", "ci", "refactor", "test"]
                },
                {
                  "title": "## Other Changes",
                  "labels": []
                }
              ],
              "label_extractor": [
                {
                  "pattern": "^(build|chore|ci|docs|feat|fix|perf|refactor|revert|style|test)(\\([\\w\\-.]+\\))?(!)?: .+",
                  "on_property": "title",
                  "target": "$1"
                }
              ]
            }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package Helm chart
        run: helm package chart --destination dist

      - name: Push Helm chart to GHCR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "${GITHUB_TOKEN}" | helm registry login ghcr.io \
            --username "${GITHUB_ACTOR}" \
            --password-stdin
          helm push "dist/svc-lb-mux-${GITHUB_REF_NAME#v}.tgz" oci://ghcr.io/nowakeai/charts

      - name: Append release artifacts
        run: |
          image_tag="${GITHUB_REF_NAME#v}"
          {
            echo
            echo "## Artifacts"
            echo
            printf -- '- Container images: `ghcr.io/%s:%s` and `ghcr.io/%s:%s`\n' "${GITHUB_REPOSITORY}" "${GITHUB_REF_NAME}" "${GITHUB_REPOSITORY}" "${image_tag}"
            printf -- '- Helm chart OCI package: `oci://ghcr.io/nowakeai/charts/svc-lb-mux --version %s`\n' "${image_tag}"
            printf -- '- Helm chart archive: attached as `svc-lb-mux-%s.tgz`\n' "${image_tag}"
          } >> dist/RELEASE_NOTES.md

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" dist/*.tgz \
            --repo "${GITHUB_REPOSITORY}" \
            --title "${GITHUB_REF_NAME}" \
            --notes-file dist/RELEASE_NOTES.md
