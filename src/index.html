<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service LoadBalancer Multiplexer Debug Console</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        [x-cloak] { display: none !important; }
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen" x-data="appState()" x-init="init()">
    <!-- Header -->
    <div class="gradient-bg shadow-lg">
        <div class="container mx-auto px-4 py-3">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-3">
                    <i data-lucide="server" class="w-8 h-8 text-white"></i>
                    <div>
                        <h1 class="text-2xl font-bold text-white">Service LoadBalancer Multiplexer</h1>
                        <p class="text-sm text-purple-200">Debug Console</p>
                    </div>
                </div>
                <div class="flex items-center space-x-3">
                    <div class="bg-white/20 backdrop-blur-sm rounded px-3 py-1.5 text-sm">
                        <div class="flex items-center space-x-2">
                            <div class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></div>
                            <span class="text-white">Refresh: <span x-text="countdown"></span>s</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="container mx-auto px-4 py-4">
        <!-- Stats Overview - More compact -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">
            <div class="bg-gray-800 rounded p-3 border border-gray-700">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-400 text-xs">Multiplexers</p>
                        <p class="text-2xl font-bold text-blue-400" x-text="Object.keys(muxServices).length"></p>
                    </div>
                    <i data-lucide="server" class="w-8 h-8 text-blue-400 opacity-30"></i>
                </div>
            </div>
            <div class="bg-gray-800 rounded p-3 border border-gray-700">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-400 text-xs">Channels</p>
                        <p class="text-2xl font-bold text-green-400" x-text="Object.keys(channelServices).length"></p>
                    </div>
                    <i data-lucide="radio" class="w-8 h-8 text-green-400 opacity-30"></i>
                </div>
            </div>
            <div class="bg-gray-800 rounded p-3 border border-gray-700">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-400 text-xs">Ready EPs</p>
                        <p class="text-2xl font-bold text-purple-400" x-text="totalReadyEndpoints"></p>
                    </div>
                    <i data-lucide="check-circle" class="w-8 h-8 text-purple-400 opacity-30"></i>
                </div>
            </div>
            <div class="bg-gray-800 rounded p-3 border border-gray-700">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-400 text-xs">Events</p>
                        <p class="text-2xl font-bold text-yellow-400" x-text="events.length"></p>
                    </div>
                    <i data-lucide="activity" class="w-8 h-8 text-yellow-400 opacity-30"></i>
                </div>
            </div>
        </div>

        <!-- Topology with collapsible sections -->
        <div class="bg-gray-800 rounded p-4 mb-4 border border-gray-700">
            <div class="flex items-center justify-between mb-3 flex-wrap gap-2">
                <div class="flex items-center space-x-2">
                    <i data-lucide="network" class="w-5 h-5 text-blue-400"></i>
                    <h2 class="text-lg font-bold">Topology</h2>
                </div>
                <div class="flex items-center gap-2">
                    <!-- Namespace Filter -->
                    <div class="relative" x-data="{ open: false }">
                        <button @click="open = !open"
                                class="flex items-center gap-1 text-xs px-2 py-1 bg-gray-700 hover:bg-gray-600 rounded">
                            <i data-lucide="filter" class="w-3 h-3"></i>
                            <span>Namespaces</span>
                            <span x-show="selectedNamespaces.length > 0"
                                  class="ml-1 px-1.5 py-0.5 bg-blue-600 rounded text-xs"
                                  x-text="selectedNamespaces.length"></span>
                        </button>
                        <div x-show="open" @click.outside="open = false"
                             class="absolute right-0 mt-1 w-56 bg-gray-700 border border-gray-600 rounded shadow-lg z-10 max-h-64 overflow-y-auto">
                            <div class="p-2">
                                <button @click="selectedNamespaces = []"
                                        class="w-full text-left text-xs px-2 py-1 hover:bg-gray-600 rounded mb-1">
                                    Clear All
                                </button>
                                <template x-for="ns in allNamespaces" :key="ns">
                                    <label class="flex items-center gap-2 px-2 py-1 hover:bg-gray-600 rounded cursor-pointer">
                                        <input type="checkbox"
                                               :value="ns"
                                               x-model="selectedNamespaces"
                                               class="rounded bg-gray-600 border-gray-500">
                                        <span class="text-xs font-mono" x-text="ns"></span>
                                    </label>
                                </template>
                            </div>
                        </div>
                    </div>
                    <button @click="toggleCollapseAll()"
                            class="text-xs px-2 py-1 bg-gray-700 hover:bg-gray-600 rounded">
                        <span x-text="collapseAll ? 'Expand All' : 'Collapse All'"></span>
                    </button>
                </div>
            </div>

            <div class="space-y-2">
                <template x-for="(muxData, muxKey) in filteredTopology" :key="muxKey">
                    <div class="border border-gray-700 rounded">
                        <!-- Mux Header - Clickable -->
                        <div @click="toggleMux(muxKey)"
                             class="flex items-center justify-between p-3 cursor-pointer hover:bg-gray-700/50">
                            <div class="flex items-center space-x-3 flex-1 min-w-0">
                                <i :data-lucide="expandedMux[muxKey] ? 'chevron-down' : 'chevron-right'"
                                   class="w-4 h-4 flex-shrink-0"></i>
                                <div class="flex items-center space-x-2 flex-shrink-0">
                                    <i data-lucide="server"
                                       :class="muxData.mux_missing ? 'w-4 h-4 text-red-400' : 'w-4 h-4 text-blue-400'"></i>
                                    <span class="font-semibold" x-text="muxKey"></span>
                                    <template x-if="muxData.mux_missing">
                                        <span class="px-1.5 py-0.5 text-xs bg-red-600 text-white rounded">MISSING</span>
                                    </template>
                                    <template x-if="!muxData.mux_missing && !muxData.has_queue">
                                        <span class="px-1.5 py-0.5 text-xs bg-yellow-600 text-white rounded" title="Mux daemon not running - read-only mode">READ-ONLY</span>
                                    </template>
                                </div>
                                <span class="text-xs text-gray-400 flex-shrink-0" x-text="'(' + muxData.channels.length + ' channels)'"></span>
                                <!-- Display External DNS/IP or warning -->
                                <template x-if="!muxData.mux_missing">
                                    <div class="flex items-center gap-1 flex-wrap">
                                        <template x-if="muxData.mux_external_dns">
                                            <template x-for="(host, idx) in getAllHosts(muxData.mux_external_dns)" :key="idx">
                                                <button @click.stop="selectedHostIndex[muxKey] = idx"
                                                        class="text-xs font-mono px-1.5 py-0.5 rounded transition-colors flex items-center gap-1"
                                                        :class="(selectedHostIndex[muxKey] || 0) === idx ? 'bg-green-600 text-white' : 'bg-gray-700 text-green-400 hover:bg-gray-600'"
                                                        :title="'Click to select: ' + host">
                                                    <template x-if="(selectedHostIndex[muxKey] || 0) === idx">
                                                        <svg class="w-3 h-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                                                    </template>
                                                    <span x-text="host"></span>
                                                </button>
                                            </template>
                                        </template>
                                        <template x-if="!muxData.mux_external_dns && muxData.mux_external_ip">
                                            <span class="text-xs text-green-400 font-mono" x-text="muxData.mux_external_ip"></span>
                                        </template>
                                        <template x-if="!muxData.mux_external_dns && !muxData.mux_external_ip">
                                            <span class="text-xs text-gray-500 font-mono">No external DNS</span>
                                        </template>
                                    </div>
                                </template>
                                <template x-if="muxData.mux_missing">
                                    <span class="text-xs text-red-400 font-mono">Mux service deleted</span>
                                </template>
                            </div>
                            <button @click.stop="copyToClipboard(getSelectedHost(muxKey, muxData.mux_external_dns) || muxData.mux_external_ip)"
                                    class="px-2 py-1 text-xs bg-blue-600 hover:bg-blue-500 rounded flex-shrink-0 ml-2"
                                    :disabled="!muxData.mux_external_dns && !muxData.mux_external_ip">
                                Copy DNS
                            </button>
                        </div>

                        <!-- Channels - Collapsible -->
                        <div x-show="expandedMux[muxKey]" x-collapse class="border-t border-gray-700">
                            <div class="p-2 space-y-1">
                                <template x-for="ch in muxData.channels" :key="ch.namespace + '/' + ch.name">
                                    <div class="bg-gray-700/30 rounded p-2 border border-gray-600 hover:bg-gray-700/50">
                                        <div class="flex items-center justify-between gap-2">
                                            <!-- Channel info and ports -->
                                            <div class="flex-1 min-w-0">
                                                <div class="flex items-center gap-2 flex-wrap">
                                                    <!-- Channel name -->
                                                    <div class="flex items-center space-x-1">
                                                        <i data-lucide="radio" class="w-3 h-3 text-green-400 flex-shrink-0"></i>
                                                        <span class="font-semibold text-xs" x-text="ch.namespace + '/' + ch.name"></span>
                                                    </div>

                                                    <!-- Custom DNS only (not inherited from mux) -->
                                                    <template x-if="ch.custom_dns">
                                                        <div class="flex items-center gap-1 flex-wrap">
                                                            <i data-lucide="globe" class="w-3 h-3 text-yellow-400"></i>
                                                            <template x-for="(host, idx) in getAllHosts(ch.custom_dns)" :key="idx">
                                                                <button @click.stop="selectedHostIndex[ch.namespace + '/' + ch.name] = idx"
                                                                        class="text-xs font-mono px-1.5 py-0.5 rounded transition-colors flex items-center gap-1"
                                                                        :class="(selectedHostIndex[ch.namespace + '/' + ch.name] || 0) === idx ? 'bg-yellow-600 text-white' : 'bg-gray-700 text-yellow-400 hover:bg-gray-600'"
                                                                        :title="'Click to select: ' + host">
                                                                    <template x-if="(selectedHostIndex[ch.namespace + '/' + ch.name] || 0) === idx">
                                                                        <svg class="w-3 h-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                                                                    </template>
                                                                    <span x-text="host"></span>
                                                                </button>
                                                            </template>
                                                            <span class="text-xs text-yellow-400">(custom)</span>
                                                        </div>
                                                    </template>

                                                    <!-- Port mappings inline -->
                                                    <div class="flex items-center gap-1 flex-wrap">
                                                        <span class="text-xs text-gray-500">→</span>
                                                        <template x-for="(port, idx) in ch.ports" :key="port.name">
                                                            <span class="flex items-center gap-0.5">
                                                                <span class="bg-gray-600 px-1.5 py-0.5 rounded text-xs font-mono"
                                                                      x-text="port.name + ':' + (port.mux_port || port.node_port || '?')"></span>
                                                                <span x-show="idx < ch.ports.length - 1" class="text-xs text-gray-500">·</span>
                                                            </span>
                                                        </template>
                                                    </div>

                                                    <!-- Pod routing -->
                                                    <template x-if="getChannelPods(ch.namespace, ch.name).length > 0">
                                                        <div class="flex items-center gap-1 flex-wrap">
                                                            <span class="text-xs text-gray-500">⇢</span>
                                                            <template x-for="(pod, idx) in getChannelPods(ch.namespace, ch.name)" :key="pod.namespace + '/' + pod.name">
                                                                <span class="flex items-center gap-0.5">
                                                                    <span class="text-xs text-purple-300 font-mono" x-text="pod.name"></span>
                                                                    <span x-show="idx < getChannelPods(ch.namespace, ch.name).length - 1" class="text-xs text-gray-500">·</span>
                                                                </span>
                                                            </template>
                                                        </div>
                                                    </template>
                                                </div>
                                            </div>

                                            <!-- Action buttons -->
                                            <div class="flex gap-1 flex-shrink-0">
                                                <button @click="copyEndpoint(ch, muxKey, muxData)"
                                                        class="px-2 py-0.5 text-xs bg-green-600 hover:bg-green-500 rounded whitespace-nowrap">
                                                    Copy
                                                </button>
                                                <button @click="testChannel(ch, muxKey, muxData)"
                                                        :disabled="!actionsEnabled || testingChannels[ch.namespace + '/' + ch.name] === true"
                                                        class="px-2 py-0.5 text-xs bg-yellow-600 hover:bg-yellow-500 rounded whitespace-nowrap disabled:opacity-50 disabled:cursor-not-allowed flex items-center gap-1">
                                                    <template x-if="testingChannels[ch.namespace + '/' + ch.name] === true">
                                                        <svg class="animate-spin h-3 w-3" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                                                        </svg>
                                                    </template>
                                                    <span>Test</span>
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </div>
                </template>
                <div x-show="Object.keys(filteredTopology).length === 0" class="text-center py-6 text-gray-500">
                    <i data-lucide="inbox" class="w-12 h-12 mx-auto mb-2 opacity-50"></i>
                    <p class="text-sm" x-text="selectedNamespaces.length > 0 ? 'No matching topology data' : 'No topology data'"></p>
                </div>
            </div>
        </div>

        <!-- Events - Compact -->
        <div class="bg-gray-800 rounded p-4 border border-gray-700">
            <div class="flex items-center justify-between mb-3 flex-wrap gap-2">
                <div class="flex items-center space-x-2">
                    <i data-lucide="activity" class="w-5 h-5 text-yellow-400"></i>
                    <h2 class="text-lg font-bold">Events</h2>
                </div>
                <div class="flex gap-1 flex-wrap">
                    <button @click="filterType = 'all'"
                            :class="filterType === 'all' ? 'bg-gray-600' : 'bg-gray-700'"
                            class="px-2 py-1 rounded text-xs">All</button>
                    <button @click="filterType = 'Normal'"
                            :class="filterType === 'Normal' ? 'bg-green-600' : 'bg-gray-700'"
                            class="px-2 py-1 rounded text-xs">Normal</button>
                    <button @click="filterType = 'Warning'"
                            :class="filterType === 'Warning' ? 'bg-yellow-600' : 'bg-gray-700'"
                            class="px-2 py-1 rounded text-xs">Warn</button>
                    <button @click="filterType = 'Error'"
                            :class="filterType === 'Error' ? 'bg-red-600' : 'bg-gray-700'"
                            class="px-2 py-1 rounded text-xs">Error</button>
                </div>
            </div>
            <div class="space-y-1 max-h-64 overflow-y-auto">
                <template x-for="event in filteredEvents.slice(0, 20)" :key="event.timestamp + event.resource">
                    <div class="bg-gray-700/30 rounded p-2 border-l-2 text-xs"
                         :class="{
                             'border-green-400': event.type === 'Normal',
                             'border-yellow-400': event.type === 'Warning',
                             'border-red-400': event.type === 'Error'
                         }">
                        <div class="flex items-center space-x-2 mb-0.5">
                            <span class="text-gray-500 font-mono text-xs"
                                  x-text="new Date(event.timestamp).toLocaleTimeString()"></span>
                            <span class="px-1.5 py-0.5 rounded text-xs font-semibold"
                                  :class="{
                                      'bg-green-500 text-white': event.type === 'Normal',
                                      'bg-yellow-500 text-black': event.type === 'Warning',
                                      'bg-red-500 text-white': event.type === 'Error'
                                  }"
                                  x-text="event.type"></span>
                            <span class="text-blue-300 font-semibold" x-text="event.resource"></span>
                        </div>
                        <p class="text-gray-300 ml-2" x-text="event.message"></p>
                    </div>
                </template>
                <div x-show="filteredEvents.length === 0" class="text-center py-4 text-gray-500 text-sm">
                    No events
                </div>
            </div>
        </div>
    </div>

    <!-- Toast notification -->
    <div x-show="toast.show" x-transition
         class="fixed bottom-4 right-4 rounded px-4 py-3 shadow-lg flex items-center gap-2 min-w-64"
         :class="{
            'bg-green-600 border border-green-500': toast.type === 'success',
            'bg-red-600 border border-red-500': toast.type === 'error',
            'bg-blue-600 border border-blue-500': toast.type === 'info',
            'bg-gray-800 border border-gray-600': !toast.type || toast.type === 'default'
         }">
        <!-- Icon based on type -->
        <template x-if="toast.type === 'success'">
            <svg class="w-5 h-5 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
                <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>
            </svg>
        </template>
        <template x-if="toast.type === 'error'">
            <svg class="w-5 h-5 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
                <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/>
            </svg>
        </template>
        <template x-if="toast.type === 'info'">
            <svg class="w-5 h-5 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
                <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd"/>
            </svg>
        </template>
        <span class="text-white font-medium" x-text="toast.message"></span>
    </div>

    <script>
        function appState() {
            return {
                muxServices: {},
                channelServices: {},
                endpoints: {},
                events: [],
                topology: {},
                filterType: 'all',
                countdown: 3,
                expandedMux: {},
                collapseAll: false,
                toast: { show: false, message: '', type: 'info' },
                selectedNamespaces: [],
                testingChannels: {}, // Track which channels are being tested
                actionsEnabled: false,
                selectedHostIndex: {}, // Track selected hostname index for each mux/channel (key: muxKey or channelKey)

                // Get all hostnames from comma-separated list
                getAllHosts(hostnameList) {
                    if (!hostnameList) return [];
                    return hostnameList.split(',').map(h => h.trim()).filter(h => h);
                },

                // Get selected hostname for a mux or channel
                getSelectedHost(key, hostnameList) {
                    const hosts = this.getAllHosts(hostnameList);
                    if (hosts.length === 0) return '';
                    const index = this.selectedHostIndex[key] || 0;
                    return hosts[Math.min(index, hosts.length - 1)];
                },

                get allNamespaces() {
                    const namespaces = new Set();
                    // Collect namespaces from topology (both mux and channels)
                    Object.entries(this.topology).forEach(([muxKey, muxData]) => {
                        // Extract mux namespace from key (format: "namespace/name")
                        const muxNs = muxKey.split('/')[0];
                        namespaces.add(muxNs);
                        // Extract channel namespaces
                        if (muxData.channels) {
                            muxData.channels.forEach(ch => namespaces.add(ch.namespace));
                        }
                    });
                    return Array.from(namespaces).sort();
                },

                get filteredTopology() {
                    if (this.selectedNamespaces.length === 0) return this.topology;

                    const filtered = {};
                    Object.entries(this.topology).forEach(([muxKey, muxData]) => {
                        // Check if mux namespace is selected
                        const muxNs = muxKey.split('/')[0];
                        if (this.selectedNamespaces.includes(muxNs)) {
                            filtered[muxKey] = muxData;
                        } else {
                            // Filter channels by namespace
                            const filteredChannels = muxData.channels.filter(ch =>
                                this.selectedNamespaces.includes(ch.namespace)
                            );
                            if (filteredChannels.length > 0) {
                                filtered[muxKey] = {
                                    ...muxData,
                                    channels: filteredChannels
                                };
                            }
                        }
                    });
                    return filtered;
                },

                get filteredEvents() {
                    let filtered = this.events;

                    // Filter by event type
                    if (this.filterType !== 'all') {
                        filtered = filtered.filter(e => e.type === this.filterType);
                    }

                    // Filter by namespace
                    if (this.selectedNamespaces.length > 0) {
                        filtered = filtered.filter(e => {
                            // Extract namespace from resource (format: "namespace/name")
                            const ns = e.resource.split('/')[0];
                            return this.selectedNamespaces.includes(ns);
                        });
                    }

                    return filtered;
                },

                get totalReadyEndpoints() {
                    return Object.values(this.endpoints).reduce((sum, ep) => sum + (ep.ready_count || 0), 0);
                },

                toggleMux(muxKey) {
                    this.expandedMux[muxKey] = !this.expandedMux[muxKey];
                },

                toggleCollapseAll() {
                    this.collapseAll = !this.collapseAll;
                    // Update all mux expanded state
                    Object.keys(this.topology).forEach(key => {
                        this.expandedMux[key] = !this.collapseAll;
                    });
                },

                getChannelPods(namespace, name) {
                    // Get pod info from endpoints
                    // Returns array of {namespace, name} objects
                    const epKey = namespace + '/' + name;
                    const ep = this.endpoints[epKey];
                    if (!ep || !ep.pods) return [];

                    // Parse pod info: format could be "namespace/podname" or just "podname"
                    return ep.pods.map(pod => {
                        if (typeof pod === 'string') {
                            // If it contains /, split it; otherwise use endpoint namespace
                            if (pod.includes('/')) {
                                const [ns, name] = pod.split('/');
                                return { namespace: ns, name: name };
                            }
                            return { namespace: namespace, name: pod };
                        }
                        return pod;
                    });
                },

                async copyToClipboard(text) {
                    if (!text) return;
                    try {
                        await navigator.clipboard.writeText(text);
                        this.showToast('Copied: ' + text);
                    } catch (err) {
                        console.error('Copy failed:', err);
                    }
                },

                async copyEndpoint(channel, muxKey, muxData) {
                    if (!channel.ports || channel.ports.length === 0) return;
                    const port = channel.ports[0];
                    const muxPort = port.mux_port || port.node_port;
                    if (!muxPort) return;

                    const channelKey = channel.namespace + '/' + channel.name;
                    // Use custom DNS if channel has it, otherwise use mux external DNS
                    const hostnameList = channel.custom_dns || muxData.mux_external_dns;
                    if (!hostnameList) return;

                    const host = this.getSelectedHost(channel.custom_dns ? channelKey : muxKey, hostnameList);
                    const endpoint = `${host}:${muxPort}`;
                    await this.copyToClipboard(endpoint);
                },

                async testChannel(channel, muxKey, muxData) {
                    if (!this.actionsEnabled) {
                        this.showToast('Debug actions are disabled', 'error');
                        return;
                    }
                    if (!channel.ports || channel.ports.length === 0) return;
                    const port = channel.ports[0];
                    const muxPort = port.mux_port || port.node_port;
                    if (!muxPort) return;

                    const channelKey = channel.namespace + '/' + channel.name;
                    this.testingChannels[channelKey] = true;

                    try {
                        // Use custom DNS if channel has it, otherwise use mux external DNS
                        const hostnameList = channel.custom_dns || muxData.mux_external_dns;
                        if (!hostnameList) return;

                        // Pass resource identifier to API for event logging
                        const host = this.getSelectedHost(channel.custom_dns ? channelKey : muxKey, hostnameList);
                        await this.testTCP(host, muxPort, channelKey);
                    } finally {
                        this.testingChannels[channelKey] = false;
                    }
                },

                async testTCP(host, port, resource = 'unknown') {
                    if (!host || !port) return;
                    try {
                        const res = await fetch(`/api/test-tcp?host=${encodeURIComponent(host)}&port=${port}&resource=${encodeURIComponent(resource)}`);
                        const data = await res.json();
                        if (data.success) {
                            this.showToast(`✓ Connected to ${host}:${port}`, 'success');
                        } else {
                            this.showToast(`✗ Failed: ${data.error}`, 'error');
                        }
                    } catch (err) {
                        this.showToast(`✗ Test failed: ${err.message}`, 'error');
                    }
                },

                showToast(message, type = 'info') {
                    this.toast = { show: true, message, type };
                    setTimeout(() => this.toast.show = false, 3000);
                },

                async updateData() {
                    try {
                        const [stateRes, topoRes, configRes] = await Promise.all([
                            fetch('/api/state'),
                            fetch('/api/topology'),
                            fetch('/api/config')
                        ]);

                        const state = await stateRes.json();
                        this.muxServices = state.mux_services;
                        this.channelServices = state.channel_services;
                        this.endpoints = state.endpoints;
                        this.events = state.events;

                        this.topology = await topoRes.json();
                        this.actionsEnabled = (await configRes.json()).actions_enabled === true;

                        // Initialize expanded state for new muxes
                        Object.keys(this.topology).forEach(key => {
                            if (!(key in this.expandedMux)) {
                                this.expandedMux[key] = !this.collapseAll;
                            }
                        });

                        this.$nextTick(() => lucide.createIcons());
                    } catch (err) {
                        console.error('Failed to fetch data:', err);
                    }
                },

                init() {
                    this.updateData();

                    setInterval(() => {
                        this.updateData();
                        this.countdown = 3;
                    }, 3000);

                    setInterval(() => {
                        if (this.countdown > 0) this.countdown--;
                    }, 1000);

                    lucide.createIcons();
                }
            }
        }
    </script>
</body>
</html>
